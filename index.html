<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ===== OPEN GRAPH ДЛЯ TELEGRAM ===== -->
    <meta property="og:title" content="Ваш заголовок" />
    <meta property="og:description" content="Ваш текст під картинкою" />
    <meta property="og:image" content="https://ваш-сайт.com/image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://ваш-сайт.com" />
    <meta property="og:type" content="website" />
    
    <!-- Для Telegram Web App (щоб відкривалось на весь екран) -->
    <meta name="telegram:card" content="summary_large_image" />
    
    <title>Ваша картинка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            margin: 0;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
        }
        .image-wrapper {
            position: relative;
            width: 95%;
            max-width: 700px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }
        .text-overlay {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
            padding: 18px 35px;
            background: rgba(0,0,0,0.55);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            width: 90%;
            max-width: 600px;
            word-wrap: break-word;
            line-height: 1.4;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Різні позиції тексту (змінюйте клас вручну) */
        .text-top { top: 8%; bottom: auto; }
        .text-center { top: 50%; bottom: auto; transform: translate(-50%, -50%); }
        .text-bottom { bottom: 10%; top: auto; }
        .text-left { left: 5%; transform: none; text-align: left; }
        .text-right { right: 5%; left: auto; transform: none; text-align: right; }
        
        /* Кнопка закриття (опціонально) */
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 28px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: 0.3s;
        }
        .close-btn:hover {
            background: rgba(255,0,0,0.8);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="image-wrapper">
            <!-- ЗАМІНІТЬ НА СВОЮ КАРТИНКУ -->
            <img src="https://ваш-сайт.com/image.jpg" alt="Картинка" id="mainImage">
            <!-- ТЕКСТ, ЯКИЙ ВИ ХОЧЕТЕ ПОКАЗАТИ -->
            <div class="text-overlay text-bottom" id="textOverlay">
                Ваш текст тут<br>
                <span style="font-size:18px;font-weight:400;">Додатковий опис</span>
            </div>
        </div>
    </div>
    
    <!-- Кнопка закриття (опціонально) -->
    <button class="close-btn" onclick="window.close();">✕</button>
    
    <script>
        // Якщо відкрито через Telegram Web App - розгортаємо на весь екран
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.expand();
            Telegram.WebApp.ready();
        }
        
        // Можна змінювати параметри через URL (опціонально)
        const urlParams = new URLSearchParams(window.location.search);
        const text = urlParams.get('text');
        const pos = urlParams.get('pos');
        const bg = urlParams.get('bg');
        
        if (text) {
            document.getElementById('textOverlay').innerHTML = decodeURIComponent(text);
        }
        if (pos) {
            document.getElementById('textOverlay').className = 'text-overlay ' + pos;
        }
        if (bg) {
            document.getElementById('container').style.background = bg;
        }
    </script>
</body>
</html>
